  // Case-insensitive search over all localUsers keys, by username OR email
  function findLocalUser(query) {
    try {
      var lu = JSON.parse(localStorage.getItem('localUsers') || '{}');
      var q = (query || '').toLowerCase().trim();
      // Exact key match first
      if (lu[query]) return lu[query];
      // Case-insensitive key match
      var keys = Object.keys(lu);
      for (var i = 0; i < keys.length; i++) {
        var u = lu[keys[i]];
        if ((u.username || keys[i]).toLowerCase() === q) return u;
        if ((u.email || '').toLowerCase() === q) return u;
      }
    } catch(e) {}

    try {
      // Pre-fill credentials if remember-me was checked
      var remUser = localStorage.getItem('rememberedUsername');
      if (remUser) {
        var uEl = document.getElementById('login-user');
        var cEl = document.getElementById('login-remember');
        if (uEl) uEl.value = remUser;
        if (cEl) cEl.checked = true;

        async function processImageGeneration(userMessage) {
            const prompt = userMessage.replace('/imagine', '').trim();
            if (!prompt) return "Error: Please provide a prompt. Example: /imagine a futuristic city";

            // Check limits (5 per day)
            const today = new Date().toDateString();
            const stored = JSON.parse(localStorage.getItem('imageGenStats') || '{}');
            if (stored.date !== today) { stored.date = today; stored.count = 0; }
            if (stored.count >= 5) {
                return "Daily Limit Reached: You have generated 5/5 pictures today.";
            }

            stored.count += 1;
            localStorage.setItem('imageGenStats', JSON.stringify(stored));

            // Generate image URL via Pollinations Secure Endpoint
            let url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}`;
            try {
                let keysPayload = {};
            
            const globalLang = localStorage.getItem('globalLanguage');
            if (globalLang && globalLang !== 'English (US)') {
                keysPayload.TARGET_LANGUAGE = globalLang;
            }

            const activePersona = localStorage.getItem('activePersona') || 'default';
            const baseGuidelines = localStorage.getItem('adminBaseGuidelines') || '';
            keysPayload.ACTIVE_PERSONA = activePersona;
            if (baseGuidelines) keysPayload.BASE_GUIDELINES = baseGuidelines;

                const tKey = localStorage.getItem('sys_api_TOGETHER_API_KEY');
                if (tKey) keysPayload.TOGETHER_API_KEY = tKey;

                const res = await fetch('/api/image/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt, keys: keysPayload })
                });
                if (res.ok) {
                    const data = await res.json();
                    if (data.url) url = data.url;
                }
            } catch(e) { console.log(e); }

            // Limit to 500 pictures globally (simulated locally or via basic memory array)
            let globalImages = JSON.parse(localStorage.getItem('globalImageCache') || '[]');
            globalImages.push(url);
            if (globalImages.length > 500) globalImages.shift(); // Remove oldest
            localStorage.setItem('globalImageCache', JSON.stringify(globalImages));

            return `<img src="${url}" alt="Generated Image" style="max-width:100%; border:1px solid var(--secondary); box-shadow:0 0 10px var(--secondary); margin-top:10px;">`;
        }

      function startTrailerRecord() {
        const url = 'https://9be761a3-9595-449c-851a-75b4eecf488f-00-2hbjfjx3oz5rn.riker.replit.dev/__mockup/preview/NeocryptzTrailer';
        const win = window.open(url, '_blank', 'width=1280,height=720');

        alert('Window opened!\n\nIn that window:\n1. Click anywhere to start audio\n2. Come back here\n\nMeanwhile, a screen recorder will start.\nSelect the Trailer tab/window when prompted.');
        setTimeout(async () => {
          try {
            const stream = await navigator.mediaDevices.getDisplayMedia({ video: { frameRate: 30 }, audio: true });
            const rec = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9,opus' });
            const chunks = [];
            rec.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
            rec.onstop = () => {
              stream.getTracks().forEach(t => t.stop());
              const blob = new Blob(chunks, { type: 'video/webm' });
              const a = document.createElement('a');
              a.href = URL.createObjectURL(blob);
              a.download = 'neocryptz-ai-trailer.webm';
              a.click();
            };
            rec.start();
            setTimeout(() => rec.stop(), 97000);
          } catch(e) { console.error(e); }
        }, 2000);

            // Update Supabase record: set real code + status active
            if (supabaseId) {
                supabaseClient.from('gift_codes').update({ code: code, status: 'active' }).eq('id', supabaseId).then(() => loadGiftCodes());
            } else if (localRefId) {
                let giftCodes = JSON.parse(localStorage.getItem('giftCodes') || '{}');
                delete giftCodes[localRefId];
                giftCodes[code] = { buyer_name: buyerName, buyer_email: buyerEmail, status: 'active', created_at: new Date().toISOString() };
                localStorage.setItem('giftCodes', JSON.stringify(giftCodes));
                loadGiftCodes();
